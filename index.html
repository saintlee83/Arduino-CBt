<!DOCTYPE html>

<body>
<div id="app">

      <button class="icon-btn" id="themeToggle" aria-label="테마 전환" title="라이트/다크">

  <div class="layout">

      <a class="nav-link" data-route="home" href="#/home">

        <span>홈</span>
      </a>
      <a class="nav-link" data-route="study" href="#/study">
